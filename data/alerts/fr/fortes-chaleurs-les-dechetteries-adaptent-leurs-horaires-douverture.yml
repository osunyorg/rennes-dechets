title: >-
  Fortes chaleurs : déchèteries et collectes s'adaptent !
level: warning
content: >-
  <p>Les déchèteries :<br>- ouvertes le matin et l’après-midi → ouvertes en continu de 9h à 13h30. (10h à 13h30 pour La Harpe),<br>- ouvertes le matin et fermées l'après-midi → sans modifications (9h à 12h),<br>- fermées le matin et ouvertes (ou fermées) l'après-midi → fermées toute la journée,<br>- Saint-Jacques → 9h-12h et 14h-18h,<br>- Tri-troc mobile sur Rennes : annulation aujourd’hui et horaires aménagés ce mercredi.<br>Collectes :<br>- décalage dès ce mardi soir des collectes jusqu'à 2h du matin au lieu de minuit,<br>- dès mercredi : collectes possibles dès 5h et jusqu'à 2h du jusqu'à jeudi inclus.      </p>
