title: >-
  Collectes : vous n'avez pas été collecté ?
level: info
content: >-
  <p>  Merci de rentrer votre bac jusqu'à la prochaine collecte. Lors de la prochaine collecte (selon votre calendrier) les déchets pourront être présentés en sac en plus du bac  :<br>- pour les bacs jaunes (emballages et papiers) : en sacs transparents disponibles dans le commerce ou en accueil mairie ;<br>- pour les bacs gris (ordures ménagères) : tous types de sacs.</p>
