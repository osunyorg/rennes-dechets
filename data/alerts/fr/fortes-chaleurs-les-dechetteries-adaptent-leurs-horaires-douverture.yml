title: >-
  Collectes : les dernières infos
level: info
content: >-
  <p>  Certaines collectes n'on pas pu être terminées du fait des fortes chaleurs car l'amplitude de collecte étaient restreinte et les volumes importants. Si vous n'avez pas été collecté, merci de rentrer votre bac jusqu'à la prochaine date de collecte. Pour rappel, les déchets peuvent être présentés en sac en plus du bac lors de la collecte suivante :<br>- pour les bacs jaunes (emballages et papiers) : en sacs transparents disponibles dans le commerce ou en accueil mairie ;<br>- pour les bacs gris (ordures ménagères) : tous types de sacs.</p>
