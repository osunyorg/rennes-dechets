title: >-
  Fortes chaleurs : les déchèteries adaptent leurs horaires d'ouverture
level: warning
content: >-
  <p>Les déchèteries :<br>- ouvertes le matin et l’après-midi → ouvertes en continu de 9h à 13h30. (10h à 13h30 pour La Harpe),<br>- ouvertes le matin et fermées l'après-midi → pas de modifications (ouvertes de 9h à 12h),<br>- fermées le matin et ouvertes (ou fermées) l'après-midi → fermées toute la journée,<br>- Saint-Jacques → 9h-12h et 14h-18h,<br>- Tri-troc mobile sur Rennes : annulation aujourd’hui mardi et horaires aménagés demain mercredi.</p>
